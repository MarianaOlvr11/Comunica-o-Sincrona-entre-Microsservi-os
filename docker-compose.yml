version: "3.9"

services:

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      # Para simular lentidão, altere o valor (em ms):
      - PRODUCT_RESPONSE_DELAY_MS=0
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/products/1"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      # Aponta para o container do product-service pela rede interna
      - PRODUCT_SERVICE_URL=http://product-service:8081
      # Timeout para chamadas ao product-service (em ms)
      - PRODUCT_SERVICE_TIMEOUT_MS=3000
    depends_on:
      product-service:
        condition: service_healthy
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge
